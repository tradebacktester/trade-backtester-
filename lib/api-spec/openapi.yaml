openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Trade Backtesting API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: strategies
    description: Trading strategy operations
  - name: backtests
    description: Backtest run operations
  - name: trades
    description: Individual trade operations
  - name: equity
    description: Equity curve operations
  - name: chart
    description: Live market chart data
paths:
  /klines:
    get:
      operationId: getKlines
      tags: [chart]
      summary: Fetch candlestick (OHLCV) data from Binance
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
        - name: interval
          in: query
          required: true
          schema:
            type: string
            enum: [1m, 5m, 15m, 1h, 4h, 1d, 1w]
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
      responses:
        "200":
          description: Candlestick data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CandleBar"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream Binance error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /strategies:
    get:
      operationId: listStrategies
      tags: [strategies]
      summary: List all strategies
      responses:
        "200":
          description: List of strategies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Strategy"
    post:
      operationId: createStrategy
      tags: [strategies]
      summary: Create a strategy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StrategyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Strategy"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /strategies/{id}:
    get:
      operationId: getStrategy
      tags: [strategies]
      summary: Get a strategy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Strategy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Strategy"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateStrategy
      tags: [strategies]
      summary: Update a strategy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StrategyUpdate"
      responses:
        "200":
          description: Updated strategy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Strategy"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteStrategy
      tags: [strategies]
      summary: Delete a strategy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /strategies/{id}/performance:
    get:
      operationId: getStrategyPerformance
      tags: [strategies]
      summary: Get aggregated performance across all backtests for a strategy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Strategy performance summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StrategyPerformance"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /backtests:
    get:
      operationId: listBacktests
      tags: [backtests]
      summary: List all backtests
      parameters:
        - name: strategyId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of backtests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Backtest"
    post:
      operationId: createBacktest
      tags: [backtests]
      summary: Create and run a backtest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BacktestInput"
      responses:
        "201":
          description: Backtest created and run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Backtest"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /backtests/summary:
    get:
      operationId: getBacktestSummary
      tags: [backtests]
      summary: Aggregate stats across all backtests
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestSummary"

  /backtests/{id}:
    get:
      operationId: getBacktest
      tags: [backtests]
      summary: Get a backtest with results
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Backtest details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteBacktest
      tags: [backtests]
      summary: Delete a backtest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /backtests/{id}/trades:
    get:
      operationId: getBacktestTrades
      tags: [trades]
      summary: Get trades for a backtest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of trades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trade"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /backtests/{id}/equity:
    get:
      operationId: getEquityCurve
      tags: [equity]
      summary: Get equity curve for a backtest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Equity curve data points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EquityPoint"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /alerts:
    get:
      operationId: listAlerts
      tags: [alerts]
      summary: List all alerts for the authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createAlert
      tags: [alerts]
      summary: Create a new alert
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertInput"
      responses:
        "201":
          description: Alert created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Plan limit exceeded or type not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /alerts/{id}:
    patch:
      operationId: updateAlert
      tags: [alerts]
      summary: Update or toggle an alert
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertUpdate"
      responses:
        "200":
          description: Updated alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteAlert
      tags: [alerts]
      summary: Delete an alert
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /alerts/notifications:
    get:
      operationId: listAlertNotifications
      tags: [alerts]
      summary: List recent alert notifications for the authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AlertNotification"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /alerts/notifications/{id}/read:
    patch:
      operationId: markAlertNotificationRead
      tags: [alerts]
      summary: Mark a notification as read
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked as read
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /alerts/stream:
    get:
      operationId: streamAlertNotifications
      tags: [alerts]
      summary: SSE stream for real-time alert notifications
      security:
        - bearerAuth: []
      responses:
        "200":
          description: SSE stream (text/event-stream)
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    CandleBar:
      type: object
      required: [time, open, high, low, close, volume]
      properties:
        time:
          type: integer
          description: Unix timestamp in seconds
        open:
          type: number
        high:
          type: number
        low:
          type: number
        close:
          type: number
        volume:
          type: number

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Strategy:
      type: object
      required: [id, name, type, symbol, timeframe, parameters, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        type:
          type: string
          enum: [sma_crossover, ema_crossover, rsi, macd, bollinger_bands, super_trend, breakout, vwap, macd_rsi, donchian_breakout, bollinger_reversal, orb, trend_following, golden_cross, turtle_trading]
        symbol:
          type: string
        timeframe:
          type: string
          enum: [1m, 5m, 15m, 1h, 4h, 1d, 1w]
        parameters:
          type: object
          additionalProperties: true
        createdAt:
          type: string

    StrategyInput:
      type: object
      required: [name, type, symbol, timeframe, parameters]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        type:
          type: string
          enum: [sma_crossover, ema_crossover, rsi, macd, bollinger_bands, super_trend, breakout, vwap, macd_rsi, donchian_breakout, bollinger_reversal, orb, trend_following, golden_cross, turtle_trading]
        symbol:
          type: string
          minLength: 1
        timeframe:
          type: string
          enum: [1m, 5m, 15m, 1h, 4h, 1d, 1w]
        parameters:
          type: object
          additionalProperties: true

    StrategyUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        type:
          type: string
          enum: [sma_crossover, ema_crossover, rsi, macd, bollinger_bands, super_trend, breakout, vwap, macd_rsi, donchian_breakout, bollinger_reversal, orb, trend_following, golden_cross, turtle_trading]
        symbol:
          type: string
        timeframe:
          type: string
          enum: [1m, 5m, 15m, 1h, 4h, 1d, 1w]
        parameters:
          type: object
          additionalProperties: true

    StrategyPerformance:
      type: object
      required: [strategyId, totalBacktests, avgReturn, bestReturn, worstReturn, avgSharpe, avgWinRate, avgMaxDrawdown]
      properties:
        strategyId:
          type: integer
        totalBacktests:
          type: integer
        avgReturn:
          type: number
        bestReturn:
          type: number
        worstReturn:
          type: number
        avgSharpe:
          type: number
        avgWinRate:
          type: number
        avgMaxDrawdown:
          type: number

    BacktestInput:
      type: object
      required: [strategyId, symbol, startDate, endDate, initialCapital]
      properties:
        strategyId:
          type: integer
        symbol:
          type: string
          minLength: 1
        startDate:
          type: string
        endDate:
          type: string
        initialCapital:
          type: number
          minimum: 1
        commission:
          type: number
          minimum: 0
          maximum: 10
          description: Commission per trade as percentage (e.g. 0.1 for 0.1%)
        slippage:
          type: number
          minimum: 0
          maximum: 5
          description: Slippage per trade as percentage (e.g. 0.05 for 0.05%)

    Backtest:
      type: object
      required: [id, strategyId, symbol, startDate, endDate, initialCapital, status, createdAt]
      properties:
        id:
          type: integer
        strategyId:
          type: integer
        strategyName:
          type: ["string", "null"]
        symbol:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        initialCapital:
          type: number
        commission:
          type: ["number", "null"]
        slippage:
          type: ["number", "null"]
        finalCapital:
          type: ["number", "null"]
        totalReturn:
          type: ["number", "null"]
        annualizedReturn:
          type: ["number", "null"]
        maxDrawdown:
          type: ["number", "null"]
        sharpeRatio:
          type: ["number", "null"]
        sortinoRatio:
          type: ["number", "null"]
        calmarRatio:
          type: ["number", "null"]
        benchmarkReturn:
          type: ["number", "null"]
        winRate:
          type: ["number", "null"]
        totalTrades:
          type: ["integer", "null"]
        profitFactor:
          type: ["number", "null"]
        consecutiveWins:
          type: ["integer", "null"]
        consecutiveLosses:
          type: ["integer", "null"]
        status:
          type: string
          enum: [pending, running, complete, failed]
        createdAt:
          type: string

    BacktestDetail:
      type: object
      required: [id, strategyId, symbol, startDate, endDate, initialCapital, status, createdAt]
      properties:
        id:
          type: integer
        strategyId:
          type: integer
        strategyName:
          type: ["string", "null"]
        symbol:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        initialCapital:
          type: number
        commission:
          type: ["number", "null"]
        slippage:
          type: ["number", "null"]
        finalCapital:
          type: ["number", "null"]
        totalReturn:
          type: ["number", "null"]
        annualizedReturn:
          type: ["number", "null"]
        maxDrawdown:
          type: ["number", "null"]
        sharpeRatio:
          type: ["number", "null"]
        sortinoRatio:
          type: ["number", "null"]
        calmarRatio:
          type: ["number", "null"]
        benchmarkReturn:
          type: ["number", "null"]
        winRate:
          type: ["number", "null"]
        totalTrades:
          type: ["integer", "null"]
        profitFactor:
          type: ["number", "null"]
        consecutiveWins:
          type: ["integer", "null"]
        consecutiveLosses:
          type: ["integer", "null"]
        yearlyReturns:
          type: array
          items:
            $ref: "#/components/schemas/YearlyReturn"
        status:
          type: string
          enum: [pending, running, complete, failed]
        createdAt:
          type: string
        trades:
          type: array
          items:
            $ref: "#/components/schemas/Trade"
        equityCurve:
          type: array
          items:
            $ref: "#/components/schemas/EquityPoint"

    BacktestSummary:
      type: object
      required: [totalBacktests, totalStrategies, avgReturn, bestReturn, worstReturn, totalTrades]
      properties:
        totalBacktests:
          type: integer
        totalStrategies:
          type: integer
        avgReturn:
          type: number
        bestReturn:
          type: number
        worstReturn:
          type: number
        totalTrades:
          type: integer
        topStrategy:
          type: ["string", "null"]

    Trade:
      type: object
      required: [id, backtestId, symbol, side, entryDate, exitDate, entryPrice, exitPrice, quantity, pnl, pnlPercent]
      properties:
        id:
          type: integer
        backtestId:
          type: integer
        symbol:
          type: string
        side:
          type: string
          enum: [long, short]
        entryDate:
          type: string
        exitDate:
          type: string
        entryPrice:
          type: number
        exitPrice:
          type: number
        quantity:
          type: number
        pnl:
          type: number
        pnlPercent:
          type: number

    EquityPoint:
      type: object
      required: [date, value, drawdown]
      properties:
        date:
          type: string
        value:
          type: number
        drawdown:
          type: number
        benchmark:
          type: number

    YearlyReturn:
      type: object
      required: [year, pct, months]
      properties:
        year:
          type: string
        pct:
          type: number
        months:
          type: array
          items:
            type: object
            required: [month, pct, label]
            properties:
              month:
                type: string
              pct:
                type: number
              label:
                type: string

    AlertConditionSpec:
      type: object
      required: [indicatorId, outputKey, operator, logicOp]
      properties:
        indicatorId:
          type: string
        outputKey:
          type: string
        operator:
          type: string
          enum: [crossAbove, crossBelow, gt, lt, eq, enters, exits, signal]
        targetValue:
          type: number
        targetIndicatorId:
          type: string
        targetOutputKey:
          type: string
        logicOp:
          type: string
          enum: [AND, OR]
        groupId:
          type: integer

    Alert:
      type: object
      required: [id, userId, name, type, symbol, timeframe, conditions, deliveryChannels, isActive, triggerOnce, triggerCount, createdAt, updatedAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [price, indicator, drawing, strategy, ai, dna]
        symbol:
          type: string
        timeframe:
          type: string
        conditions:
          type: array
          items:
            $ref: "#/components/schemas/AlertConditionSpec"
        deliveryChannels:
          type: array
          items:
            type: string
        isActive:
          type: boolean
        triggerOnce:
          type: boolean
        triggerCount:
          type: integer
        lastTriggeredAt:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    AlertInput:
      type: object
      required: [name, symbol, conditions]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        type:
          type: string
          enum: [price, indicator, drawing, strategy, ai, dna]
          default: price
        symbol:
          type: string
          minLength: 1
        timeframe:
          type: string
          default: 1d
        conditions:
          type: array
          items:
            $ref: "#/components/schemas/AlertConditionSpec"
          minItems: 1
        deliveryChannels:
          type: array
          items:
            type: string
          default: [in_app]
        triggerOnce:
          type: boolean
          default: false

    AlertUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        type:
          type: string
          enum: [price, indicator, drawing, strategy, ai, dna]
        symbol:
          type: string
        timeframe:
          type: string
        conditions:
          type: array
          items:
            $ref: "#/components/schemas/AlertConditionSpec"
        deliveryChannels:
          type: array
          items:
            type: string
        isActive:
          type: boolean
        triggerOnce:
          type: boolean

    AlertNotification:
      type: object
      required: [id, alertId, userId, message, triggeredAt, isRead]
      properties:
        id:
          type: integer
        alertId:
          type: integer
        userId:
          type: integer
        message:
          type: string
        triggeredAt:
          type: string
        isRead:
          type: boolean
